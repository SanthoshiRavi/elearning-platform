AWSTemplateFormatVersion: '2010-09-09'

Description: Jenkins Server for E-Learning Platform

Parameters:

  KeyPairName:
    Type: AWS::EC2::KeyPair::KeyName
    Default: ec2key

  PublicSubnetId:
    Type: AWS::EC2::Subnet::Id

  JenkinsSecurityGroup:
    Type: AWS::EC2::SecurityGroup::Id

  SSHSecurityGroup:
    Type: AWS::EC2::SecurityGroup::Id

Resources:

  #########################################################
  # IAM ROLE
  #########################################################

  JenkinsRole:

    Type: AWS::IAM::Role

    Properties:

      AssumeRolePolicyDocument:

        Version: "2012-10-17"

        Statement:

          - Effect: Allow

            Principal:

              Service:
                - ec2.amazonaws.com

            Action:
              - sts:AssumeRole

      ManagedPolicyArns:

        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore

        - arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy

  #########################################################
  # INSTANCE PROFILE
  #########################################################

  JenkinsInstanceProfile:

    Type: AWS::IAM::InstanceProfile

    Properties:

      Roles:

        - !Ref JenkinsRole

  #########################################################
  # JENKINS EC2
  #########################################################

  JenkinsEC2:

    Type: AWS::EC2::Instance

    Properties:

      InstanceType: t3.micro

      ImageId: !Sub "{{resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64}}"

      KeyName: !Ref KeyPairName

      SubnetId: !Ref PublicSubnetId

      IamInstanceProfile: !Ref JenkinsInstanceProfile

      BlockDeviceMappings:

        - DeviceName: /dev/xvda
          Ebs:
            VolumeSize: 30
            VolumeType: gp3
            DeleteOnTermination: true

      SecurityGroupIds:

        - !Ref JenkinsSecurityGroup

        - !Ref SSHSecurityGroup

      Tags:

        - Key: Name
          Value: elearning-jenkins

        - Key: Project
          Value: elearning-platform

        - Key: Environment
          Value: Development

      UserData:

        Fn::Base64: |
          #!/bin/bash
          set -eux

          dnf update -y

          dnf install -y \
            java-21-amazon-corretto \
            docker \
            git \
            wget \
            awscli \
            maven

          # Node.js 20.x for frontend builds
          curl -fsSL https://rpm.nodesource.com/setup_20.x | bash -
          dnf install -y nodejs

          systemctl enable docker
          systemctl start docker

          usermod -aG docker ec2-user

          mkdir -p /usr/libexec/docker/cli-plugins
          curl -SL "https://github.com/docker/compose/releases/latest/download/docker-compose-linux-$(uname -m)" \
            -o /usr/libexec/docker/cli-plugins/docker-compose
          chmod +x /usr/libexec/docker/cli-plugins/docker-compose

          # 2GB swap: t3.micro has only 1GB RAM, which Maven+npm+Docker builds
          # running back-to-back can exhaust and OOM without this.
          fallocate -l 2G /swapfile
          chmod 600 /swapfile
          mkswap /swapfile
          swapon /swapfile
          echo '/swapfile none swap sw 0 0' >> /etc/fstab

          wget -O /etc/yum.repos.d/jenkins.repo \
          https://pkg.jenkins.io/redhat-stable/jenkins.repo

          rpm --import https://pkg.jenkins.io/redhat-stable/jenkins.io-2023.key

          dnf install -y jenkins

          usermod -aG docker jenkins

          systemctl daemon-reload

          systemctl enable jenkins

          systemctl start jenkins

  #########################################################
  # ELASTIC IP
  #########################################################

  JenkinsElasticIP:

    Type: AWS::EC2::EIP

    Properties:

      Domain: vpc

      Tags:

        - Key: Name
          Value: elearning-jenkins-eip

        - Key: Project
          Value: elearning-platform

  JenkinsElasticIPAssociation:

    Type: AWS::EC2::EIPAssociation

    Properties:

      AllocationId: !GetAtt JenkinsElasticIP.AllocationId

      InstanceId: !Ref JenkinsEC2

#########################################################
# OUTPUTS
#########################################################

Outputs:

  JenkinsInstanceId:

    Description: Jenkins EC2 Instance ID

    Value: !Ref JenkinsEC2

  JenkinsPrivateIP:

    Description: Jenkins Private IP

    Value: !GetAtt JenkinsEC2.PrivateIp

  JenkinsPublicIP:

    Description: Jenkins Elastic IP

    Value: !Ref JenkinsElasticIP