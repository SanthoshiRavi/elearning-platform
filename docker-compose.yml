services:
  postgres:
    image: postgres:16
    container_name: elearning-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: elearning_db
      POSTGRES_USER: elearning_user
      POSTGRES_PASSWORD: elearning_pass
      TZ: UTC
      PGTZ: UTC
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL","pg_isready -U elearning_user -d elearning_db"]
      interval: 10s
      timeout: 5s
      retries: 5
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: elearning-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/elearning_db
      SPRING_DATASOURCE_USERNAME: elearning_user
      SPRING_DATASOURCE_PASSWORD: elearning_pass
      JWT_SECRET: local-development-secret-key-for-elearning-platform-change-in-prod
      ADMIN_NAME: Admin
      ADMIN_EMAIL: admin@elearning.com
      ADMIN_PASSWORD: Admin@123
      STORAGE_TYPE: local
      UPLOAD_DIR: /app/uploads
    ports:
      - "8081:8081"
    volumes:
      - ./backend/uploads:/app/uploads
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: elearning-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"
volumes:
  postgres_data:
  backend_uploads:
